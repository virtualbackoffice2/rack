<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>BC Ledger</h1>

      </div>
      <button id="backBtn" class="secondary hidden" type="button" onclick="showHome()">Back to BC List</button>
    </header>

    <section id="homeView">
      <div class="search-panel">
        <input id="globalSearch" list="memberSuggestions" placeholder="Search member, phone, area, BC name or date..." autocomplete="off" />
        <datalist id="memberSuggestions"></datalist>
        <button type="button" onclick="loadBcs()">Search</button>
      </div>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>BC Register</h2>
            <span class="hint">Create a new BC only when needed.</span>
          </div>
          <button type="button" onclick="toggleBcForm()">+ BC</button>
        </div>
        <form id="bcForm" class="grid-form hidden">
          <label>BC Name
            <input name="name" placeholder="Usually start date or month name" />
          </label>
          <label>Start Date
            <input name="start_date" type="date" onchange="syncBcNameFromDate()" />
          </label>
          <label>Duration Months
            <input name="duration_months" type="number" min="1" value="12" />
          </label>
          <label>Monthly Total
            <input name="monthly_total" type="number" min="0" step="1" placeholder="Total pool amount" />
          </label>
          <label>No. of Units
            <input name="unit_count" type="number" min="1" placeholder="Total BC units" />
          </label>
          <label class="wide">Remarks
            <input name="remarks" placeholder="Optional notes" />
          </label>
          <div class="actions wide">
            <button id="bcSubmitBtn" type="submit">Create BC</button>
            <button class="secondary" type="button" onclick="resetBcForm()">Cancel</button>
          </div>
        </form>
      </section>

      <section id="personalLedgerPanel" class="panel hidden">
        <div class="panel-head">
          <div>
            <h2>Personal Ledger</h2>
            <span id="personalLedgerHint" class="hint"></span>
          </div>
        </div>
        <div class="table-wrap">
          <table id="personalLedgerTable">
            <thead>
              <tr>
                <th>Member</th>
                <th>Phone</th>
                <th>Area</th>
                <th>BC</th>
                <th>Unit</th>
                <th id="ledgerDueHead">Due</th>
                <th id="ledgerPaidHead">Paid</th>
                <th id="ledgerBalanceHead">Balance</th>
                <th>Received</th>
                <th>BC</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="bcListPanel" class="panel">
        <div class="panel-head">
          <div>
            <h2>BC List</h2>
            <span id="bcListHint" class="hint">All BCs</span>
          </div>
          <button class="secondary" type="button" onclick="loadBcs()">Refresh</button>
        </div>
        <div class="table-wrap">
          <table id="bcTable">
            <thead>
              <tr>
                <th>BC</th>
                <th>Start</th>
                <th>Duration</th>
                <th>Monthly Total</th>
                <th>Per Unit</th>
                <th>Units</th>
                <th>Paid Total</th>
                <th>Remarks</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </section>

    <section id="matrixView" class="hidden matrix-frame-shell">
      <iframe id="matrixFrame" title="BC Matrix"></iframe>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <div id="confirmModal" class="confirm-modal hidden">
    <div class="confirm-box">
      <h2 id="confirmTitle">Confirm</h2>
      <p id="confirmText"></p>
      <div id="confirmCritical" class="critical hidden"></div>
      <div class="confirm-actions">
        <button id="confirmYes" type="button">Yes</button>
        <button class="secondary" type="button" onclick="closeConfirm()">Cancel</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
